<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--teal:#34647D;--blue:#6795BD;--lblue:#A5BFD3;--charcoal:#2e2e2e;--muted:rgba(46,46,46,.6)}
  body{
    font-family:'DM Sans',sans-serif;background:#fff;color:var(--charcoal);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;

  h1 em{font-style:italic;color:var(--blue)}
  p{font-size:15px;color:var(--muted);line-height:1.7;max-width:440px;margin-bottom:30px}
  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-block;text-decoration:none;font-weight:700;font-size:13px;letter-spacing:.4px;padding:13px 26px;transition:.2s}
  .btn-primary{background:var(--teal);color:#fff}
  .btn-primary:hover{background:var(--blue)}
  .btn-outline{border:1.5px solid rgba(52,100,125,.35);color:var(--teal);font-family:'Cormorant',serif;font-size:16px;font-weight:500;padding:12px 22px}
